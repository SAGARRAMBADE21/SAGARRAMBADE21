<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Sagar Rambade, AI Research Intern researching agent harnesses and agentic AI">
  <defs>
    <!-- base background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c0a"/>
      <stop offset="100%" stop-color="#0e0d0a"/>
    </linearGradient>

    <!-- plasma blob gradients (authentic XO greens) -->
    <radialGradient id="bright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lime" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#83d63a" stop-opacity="0.80"/>
      <stop offset="70%" stop-color="#83d63a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6bbe45" stop-opacity="0.75"/>
      <stop offset="72%" stop-color="#6bbe45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a9e3a" stop-opacity="0.70"/>
      <stop offset="72%" stop-color="#5a9e3a" stop-opacity="0"/>
    </radialGradient>

    <!-- soft blur to fuse the blobs into a shader-like field -->
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>

    <!-- film grain / halftone noise -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.40
                0 0 0 0 0.72
                0 0 0 0 0.26
                0 0 0 0.55 0"/>
    </filter>

    <!-- dot-grid halftone overlay -->
    <pattern id="dots" width="13" height="13" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>

    <!-- edge vignette -->
    <radialGradient id="vig" cx="52%" cy="42%" r="78%">
      <stop offset="52%" stop-color="#06080a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05060a" stop-opacity="0.9"/>
    </radialGradient>

    <!-- left shade so the headline stays legible over the plasma -->
    <linearGradient id="leftshade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06080a" stop-opacity="0.88"/>
      <stop offset="42%" stop-color="#06080a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06080a" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="card">
      <rect x="0" y="0" width="1280" height="420" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- background -->
    <rect width="1280" height="420" fill="url(#bg)"/>

    <!-- animated plasma field -->
    <g filter="url(#soft)">
      <g>
        <circle cx="430" cy="150" r="300" fill="url(#lime)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 60 40; -30 70; 0 0" dur="14s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="1000" cy="300" r="350" fill="url(#green)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -70 -50; 40 30; 0 0" dur="17s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="760" cy="110" r="240" fill="url(#bright)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 50 60; -40 -30; 0 0" dur="11s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="1160" cy="400" r="300" fill="url(#deep)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -50 40; 30 -50; 0 0" dur="19s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- texture + depth -->
    <rect width="1280" height="420" fill="url(#dots)"/>
    <rect width="1280" height="420" filter="url(#grain)" opacity="0.10"/>
    <rect width="1280" height="420" fill="url(#vig)"/>
    <rect width="1280" height="420" fill="url(#leftshade)"/>

    <!-- ===== content ===== -->

    <!-- XO mark (geometry reused from xo-logo.svg, white + #83d63a) -->
    <g transform="translate(64,52) scale(0.30) translate(-31,-165)" stroke-width="20" fill="none" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round">
      <polyline stroke="#fff"     points="36.99 165.84 118.47 247.31 31.16 334.61"/>
      <polyline stroke="#83d63a"  points="328.12 165.06 246.65 246.53 333.95 333.84"/>
      <polyline stroke="#83d63a"  points="380.51 165.06 461.99 246.53 374.68 333.84"/>
      <polyline stroke="#fff"     points="244.91 165.84 163.44 247.31 250.74 334.61"/>
    </g>

    <!-- status pill -->
    <g transform="translate(64,124)">
      <rect x="0" y="0" width="286" height="34" rx="17" fill="#10160c" stroke="#2c3f22" stroke-width="1"/>
      <circle cx="20" cy="17" r="4" fill="#83d63a">
        <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="36" y="22" font-size="14" font-weight="500" fill="#a7c995" letter-spacing="0.2">AI Research Intern @ XO</text>
    </g>

    <!-- headline -->
    <text x="62" y="240" font-size="68" font-weight="800" fill="#f2efe9" letter-spacing="-1.5">Sagar Rambade</text>

    <!-- accent line -->
    <text x="64" y="300" font-size="38" font-weight="700" fill="#f2efe9" letter-spacing="-0.5">Researching <tspan fill="#6bbe45">agent harnesses</tspan> &amp; agentic AI</text>

    <!-- subhead -->
    <text x="64" y="344" font-size="18" font-weight="400" fill="#8f9a82">Control loops, tool routing, and sandboxed environments for reliable agents.</text>

    <!-- card border -->
    <rect x="0.5" y="0.5" width="1279" height="419" rx="23.5" fill="none" stroke="#1c2718" stroke-width="1"/>
  </g>
</svg>
